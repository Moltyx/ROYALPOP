<style>
  html, body { background:#FFFFFF; color:#111111; }
  body { font-family: 'Manrope', ui-sans-serif, system-ui, -apple-system, sans-serif; -webkit-font-smoothing:antialiased; }

  .hair-d { box-shadow: inset 0 1px 0 rgba(0,0,0,.06); }

  .pill { padding:10px 18px; border-radius:999px; font-weight:600; font-size:14px; }
  /* placeholder stripe utility */

    background-image: repeating-linear-gradient(45deg, rgba(0,0,0,.06) 0 1px, transparent 1px 10px);
  }
  .ph-stripes-d {
    background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.07) 0 1px, transparent 1px 10px);
  }

  .no-bar { scrollbar-width: none; }
  /* smooth section transitions */
  section { will-change: transform; }
  /* selection */
  ::selection { background:#111; color:#fff; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
  // Some preview iframes leave CSS animations / transitions stuck in the "pending"
  // play state (startTime: null) so they never advance. Nudge them awake each frame.
  (function () {
    function kick() {
      if (!document.getAnimations) return;
      const anims = document.getAnimations();
      for (const a of anims) {
        if (a.playState === 'running' && a.startTime === null) {
          try { a.startTime = document.timeline.currentTime; } catch (e) {}
        }
      }
      requestAnimationFrame(kick);
    }
    requestAnimationFrame(kick);
  })();
</script>
